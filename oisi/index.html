<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大石建設 マニュアル・資料</title>
<style>
  :root {
    --cp-blue-50:  #F2F8FC;
    --cp-blue-100: #D6E9F5;
    --cp-blue-200: #C5DDE9;
    --cp-blue-400: #74B2E0;
    --cp-blue-700: #2E6BA6;
    --cp-blue-900: #1A3A5C;
    --cp-gray-600: #666666;
    --cp-gray-900: #1A1A1A;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
    line-height: 1.75;
    color: var(--cp-gray-900);
    background: var(--cp-blue-50);
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }
  header.cover {
    background: linear-gradient(135deg, var(--cp-blue-700) 0%, var(--cp-blue-400) 100%);
    color: #fff;
    padding: 56px 32px;
    border-radius: 14px;
    margin-bottom: 32px;
    box-shadow: 0 6px 20px rgba(46,107,166,.15);
  }
  header.cover h1 {
    font-size: 28px;
    margin: 0 0 10px;
    letter-spacing: .03em;
  }
  header.cover .subtitle {
    font-size: 15px;
    opacity: .92;
  }
  section.menu {
    background: #fff;
    border: 1px solid var(--cp-blue-200);
    border-radius: 8px;
    padding: 24px 28px;
    margin-bottom: 20px;
  }
  section.menu h2 {
    color: var(--cp-blue-700);
    margin: 0 0 14px;
    font-size: 18px;
    padding-left: 10px;
    border-left: 5px solid var(--cp-blue-400);
  }
  .menu-card {
    display: block;
    text-decoration: none;
    color: inherit;
    background: var(--cp-blue-50);
    border: 1px solid var(--cp-blue-200);
    border-radius: 6px;
    padding: 18px 22px;
    margin-bottom: 12px;
    transition: background .15s, border-color .15s, transform .1s;
  }
  .menu-card:hover {
    background: var(--cp-blue-100);
    border-color: var(--cp-blue-400);
    transform: translateX(2px);
  }
  .menu-card .title {
    font-weight: 700;
    color: var(--cp-blue-700);
    font-size: 16px;
  }
  .menu-card .desc {
    font-size: 13.5px;
    color: var(--cp-gray-600);
    margin-top: 6px;
  }
  footer {
    text-align: center;
    margin-top: 32px;
    font-size: 12px;
    color: var(--cp-gray-600);
  }
</style>
</head>
<body>

<header class="cover">
  <h1>大石建設 マニュアル・資料</h1>
  <div class="subtitle">社内向けドキュメントサイト</div>
</header>

<section class="menu">
  <h2>カテゴリ</h2>

  <a class="menu-card" href="benkyokai/">
    <div class="title">1級施工管技 社内対策講座 勉強会資料</div>
    <div class="desc">2026年度 社内対策講座の勉強会ごとの資料を公開しています（講師：林副部長／大関）</div>
  </a>
</section>

<footer>
  大石建設株式会社 ／ 運営：クラウドパワー株式会社
</footer>

</body>
</html>
